<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>DUAT Public Test — 古代エジプト落ち物パズル</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, sans-serif;
        background: #080704;
        color: #eadfca;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        overscroll-behavior: none;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 50% 8%, rgba(212, 175, 55, 0.16), transparent 28rem),
          radial-gradient(circle at 18% 24%, rgba(112, 74, 28, 0.24), transparent 20rem),
          linear-gradient(135deg, #050403 0%, #100b08 58%, #25170c 100%);
      }

      main {
        width: min(100%, 58rem);
        padding: 0.5rem;
        box-sizing: border-box;
        text-align: center;
      }

      h1 {
        margin: 0 0 0.25rem;
        color: #d4af37;
        font-family: Georgia, serif;
        letter-spacing: 0.12em;
      }

      p {
        margin: 0 0 1rem;
        color: #cdbf9d;
      }

      .desktop-control-help {
        width: min(100%, 760px);
        margin: 0.55rem auto 0;
        color: #bcae90;
        font-size: 0.78rem;
        line-height: 1.35;
        letter-spacing: 0.02em;
      }

      #game {
        display: flex;
        justify-content: center;
        min-width: 0;
        width: 100%;
        touch-action: none;
      }

      #game canvas {
        width: auto;
        max-width: 100%;
        height: min(600px, 79vw, calc(100dvh - 16rem));
        border: 2px solid rgba(212, 175, 55, 0.78);
        box-shadow:
          0 18px 44px rgba(0, 0, 0, 0.58),
          0 0 34px rgba(212, 175, 55, 0.12);
        touch-action: none;
        user-select: none;
      }

      .touch-controls {
        display: none;
        width: min(100%, 760px);
        margin: 0.55rem auto 0;
        gap: 0.45rem;
        touch-action: none;
        user-select: none;
      }

      .touch-controls.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .touch-row,
      .touch-controls__top,
      .touch-controls__main,
      .touch-cluster,
      .touch-actions,
      .touch-bombs {
        display: grid;
        gap: 0.45rem;
      }

      .touch-controls__top,
      .touch-controls__main {
        grid-template-columns: 1fr 1fr;
        align-items: end;
      }

      .touch-row {
        grid-template-columns: repeat(3, 1fr);
      }

      .touch-actions,
      .touch-bombs {
        grid-template-columns: repeat(2, 1fr);
      }

      .touch-button {
        min-height: 2.65rem;
        border: 2px solid rgba(212, 175, 55, 0.82);
        border-radius: 0.55rem;
        background:
          linear-gradient(180deg, rgba(67, 43, 22, 0.98), rgba(24, 16, 9, 0.98));
        box-shadow: inset 0 0 0 1px rgba(244, 215, 122, 0.16), 0 0.35rem 0.9rem rgba(0, 0, 0, 0.32);
        color: #f4d77a;
        font-weight: 800;
        font-size: 1rem;
        letter-spacing: 0.05em;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }

      .touch-button:active {
        transform: translateY(1px);
        background: linear-gradient(180deg, rgba(92, 61, 27, 1), rgba(36, 24, 13, 1));
      }

      .touch-button--pause,
      .touch-button--cancel,
      .touch-button--bomb {
        min-height: 2.1rem;
        font-size: 0.8rem;
        color: #eadfca;
        border-color: rgba(244, 215, 122, 0.62);
      }

      .touch-button--drop {
        min-height: 3rem;
        font-size: 1.06rem;
      }

      .debug-toggle-button {
        position: fixed;
        top: max(0.35rem, env(safe-area-inset-top));
        right: max(0.35rem, env(safe-area-inset-right));
        z-index: 20;
        min-width: 2.35rem;
        min-height: 1.65rem;
        border: 1px solid rgba(244, 215, 122, 0.34);
        border-radius: 999px;
        background: rgba(16, 11, 6, 0.42);
        color: rgba(244, 215, 122, 0.56);
        font-size: 0.62rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        -webkit-tap-highlight-color: transparent;
      }

      .debug-panel {
        display: none;
        width: min(100%, 760px);
        margin: 0.4rem auto 0;
        border: 1px solid rgba(244, 215, 122, 0.54);
        border-radius: 0.65rem;
        background: rgba(13, 9, 5, 0.94);
        box-shadow: 0 0.5rem 1.4rem rgba(0, 0, 0, 0.35);
        overflow: hidden;
        text-align: left;
      }

      .debug-panel.is-visible {
        display: block;
      }

      .debug-panel__summary {
        width: 100%;
        border: 0;
        border-bottom: 1px solid rgba(244, 215, 122, 0.24);
        background: rgba(58, 31, 0, 0.72);
        color: #ffdf6e;
        padding: 0.42rem 0.65rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-align: left;
      }

      .debug-panel__body {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.35rem;
        padding: 0.45rem;
      }

      .debug-panel.is-collapsed .debug-panel__body {
        display: none;
      }

      .debug-button {
        min-height: 2.15rem;
        border: 1px solid rgba(244, 215, 122, 0.58);
        border-radius: 0.45rem;
        background: linear-gradient(180deg, rgba(63, 39, 18, 0.98), rgba(24, 16, 9, 0.98));
        color: #f4d77a;
        font-size: 0.74rem;
        font-weight: 800;
        line-height: 1.05;
        -webkit-tap-highlight-color: transparent;
      }

      .debug-button:active,
      .debug-toggle-button:active,
      .debug-panel__summary:active {
        transform: translateY(1px);
      }

      @media (hover: none), (max-width: 760px) {
        body {
          align-items: start;
        }

        main {
          --mobile-header-height: 4.95rem;
          --mobile-controls-reserved-height: 8.4rem;
          --mobile-gameplay-controls-gap: 0.45rem;
          --mobile-gameplay-bottom-limit: calc(
            var(--mobile-header-height) +
            var(--mobile-controls-reserved-height) +
            var(--mobile-gameplay-controls-gap)
          );
          width: 100%;
          min-height: 100dvh;
          display: flex;
          flex-direction: column;
          justify-content: flex-start;
          padding: max(0.25rem, env(safe-area-inset-top)) max(0.35rem, env(safe-area-inset-right)) max(0.2rem, env(safe-area-inset-bottom)) max(0.35rem, env(safe-area-inset-left));
        }

        h1 {
          margin-bottom: 0.1rem;
          font-size: clamp(1.05rem, 6vw, 1.35rem);
          line-height: 1.05;
        }

        p {
          max-width: 32rem;
          margin: 0 auto 0.18rem;
          font-size: clamp(0.68rem, 2.7vw, 0.78rem);
          line-height: 1.2;
        }

        #game {
          flex: 1 1 auto;
          align-items: flex-start;
        }

        #game canvas {
          width: min(100%, calc((100dvh - var(--mobile-gameplay-bottom-limit)) * 1.166));
          height: auto;
          max-height: calc(100dvh - var(--mobile-gameplay-bottom-limit));
        }

        .desktop-control-help {
          display: none;
        }

        .debug-panel__body {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .debug-button {
          min-height: 2rem;
          font-size: clamp(0.68rem, 2.8vw, 0.78rem);
        }

        .touch-controls {
          --touch-grid-gap: 0.4rem;
          --touch-bomb-main-spacer: 1.1rem;
          --touch-action-width-scale: 70%;
          display: grid;
          grid-template-columns: repeat(6, minmax(0, 1fr));
          grid-template-rows: minmax(2.1rem, auto) var(--touch-bomb-main-spacer) repeat(2, minmax(2.1rem, auto));
          column-gap: var(--touch-grid-gap);
          row-gap: var(--touch-grid-gap);
          margin-top: 0.1rem;
          margin-bottom: max(0.1rem, env(safe-area-inset-bottom));
        }

        .touch-controls__top,
        .touch-controls__main,
        .touch-cluster,
        .touch-row,
        .touch-actions,
        .touch-bombs {
          display: contents;
        }

        .touch-button {
          min-width: 0;
          min-height: 2.42rem;
          padding: 0.25rem 0.2rem;
          border-radius: 0.45rem;
          font-size: clamp(0.78rem, 3.2vw, 0.95rem);
          line-height: 1;
        }

        .touch-button--pause,
        .touch-button--cancel,
        .touch-button--bomb {
          min-height: 2.18rem;
          font-size: clamp(0.66rem, 2.7vw, 0.78rem);
        }

        .touch-button--drop {
          min-height: 2.75rem;
          font-size: clamp(0.84rem, 3.6vw, 0.98rem);
        }

        .touch-button--cancel {
          opacity: 0;
          pointer-events: none;
        }

        .touch-controls--bomb-selected .touch-button--cancel {
          opacity: 1;
          pointer-events: auto;
        }

        [data-duat-action="bomb-0"] { grid-column: 1; grid-row: 1; }
        [data-duat-action="bomb-1"] { grid-column: 2; grid-row: 1; }
        [data-duat-action="bomb-2"] { grid-column: 3; grid-row: 1; }
        [data-duat-action="bomb-3"] { grid-column: 4; grid-row: 1; }
        [data-duat-action="cancel"] { grid-column: 5; grid-row: 1; }
        [data-duat-action="pause"] { grid-column: 6; grid-row: 1; }

        [data-duat-action="left"] { grid-column: 1 / 3; grid-row: 3; }
        [data-duat-action="right"] { grid-column: 3 / 5; grid-row: 3; }
        [data-duat-action="down"] { grid-column: 2 / 4; grid-row: 4; }
        [data-duat-action="rotate"],
        [data-duat-action="drop"] {
          width: var(--touch-action-width-scale);
          justify-self: end;
        }
        [data-duat-action="rotate"] { grid-column: 5 / 7; grid-row: 3; }
        [data-duat-action="drop"] { grid-column: 5 / 7; grid-row: 4; }
      }

      @media (max-width: 420px) {
        h1 {
          font-size: clamp(1rem, 5.8vw, 1.25rem);
        }

        p {
          margin-bottom: 0.2rem;
          font-size: clamp(0.64rem, 2.5vw, 0.74rem);
        }

        .touch-controls {
          --touch-grid-gap: 0.3rem;
          --touch-bomb-main-spacer: 1.2rem;
        }
      }

      @media (hover: none) and (max-height: 620px), (max-width: 760px) and (max-height: 620px) {
        main {
          --mobile-header-height: 4.85rem;
          --mobile-controls-reserved-height: 8.25rem;
          --mobile-gameplay-controls-gap: 0.5rem;
          padding-top: max(0.15rem, env(safe-area-inset-top));
        }

        p {
          margin-bottom: 0.2rem;
        }

        #game canvas {
          max-height: calc(100dvh - var(--mobile-gameplay-bottom-limit));
        }

        .touch-controls {
          --touch-grid-gap: 0.25rem;
          --touch-bomb-main-spacer: 1.3rem;
          grid-template-rows: minmax(2.1rem, auto) var(--touch-bomb-main-spacer) repeat(2, minmax(2.1rem, auto));
          margin-top: 0.25rem;
        }

        .touch-button {
          min-height: 2.28rem;
        }

        .touch-button--pause,
        .touch-button--cancel,
        .touch-button--bomb {
          min-height: 2.05rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 data-duat-title>DUAT</h1>

      <button class="debug-toggle-button" type="button" data-duat-debug-toggle aria-label="Toggle debug mode">DBG</button>
      <p>古代エジプト落ち物パズル：臓器を集め、カノプスセットを完成させ、神々を目覚めさせよう。</p>
      <div id="game"></div>

      <section class="debug-panel is-collapsed" aria-label="DUAT debug controls" data-duat-debug-panel>
        <button class="debug-panel__summary" type="button" data-duat-debug-collapse>DEBUG ▸</button>
        <div class="debug-panel__body">
          <button class="debug-button" type="button" data-duat-action="debug-add-god">+God</button>
          <button class="debug-button" type="button" data-duat-action="debug-add-tier">+Tier</button>
          <button class="debug-button" type="button" data-duat-action="debug-preserve">+Preserve</button>
          <button class="debug-button" type="button" data-duat-action="debug-use-god">Use God</button>
          <button class="debug-button" type="button" data-duat-action="debug-result-game-over">Result:<br>Game Over</button>
          <button class="debug-button" type="button" data-duat-action="debug-result-incomplete">Result:<br>Incomplete</button>
          <button class="debug-button" type="button" data-duat-action="debug-result-complete">Result:<br>Complete</button>
          <button class="debug-button" type="button" data-duat-action="debug-reset-run">Reset Run</button>
        </div>
      </section>
      <p class="desktop-control-help">キーボード:<br>←/→: 移動<br>↓: ソフトドロップ<br>↑/Z: 回転<br>Space: ハードドロップ<br>Enter: ポーズ<br>1〜4: ボム<br>Esc: 取消<br>M: ミュート</p>
      <section class="touch-controls" aria-label="DUAT タッチ操作">
        <div class="touch-controls__top">
          <button class="touch-button touch-button--cancel" type="button" data-duat-action="cancel">ESC</button>
          <button class="touch-button touch-button--pause" type="button" data-duat-action="pause">ポーズ</button>
        </div>
        <div class="touch-controls__main">
          <div class="touch-cluster" aria-label="移動操作">
            <div class="touch-row">
              <button class="touch-button" type="button" data-duat-action="left" aria-label="左">←</button>
              <button class="touch-button" type="button" data-duat-action="down" data-duat-hold="true" aria-label="下">↓</button>
              <button class="touch-button" type="button" data-duat-action="right" aria-label="右">→</button>
            </div>
          </div>
          <div class="touch-actions" aria-label="アクション操作">
            <button class="touch-button" type="button" data-duat-action="rotate">回転</button>
            <button class="touch-button touch-button--drop" type="button" data-duat-action="drop">落下</button>
          </div>
        </div>
        <div class="touch-bombs" aria-label="ボム操作">
          <button class="touch-button touch-button--bomb" type="button" data-duat-action="bomb-0">B1</button>
          <button class="touch-button touch-button--bomb" type="button" data-duat-action="bomb-1">B2</button>
          <button class="touch-button touch-button--bomb" type="button" data-duat-action="bomb-2">B3</button>
          <button class="touch-button touch-button--bomb" type="button" data-duat-action="bomb-3">B4</button>
        </div>
      </section>
    </main>
    <script>
      window.DUAT_ASSET_BASE_PATH = '../assets';
    </script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script type="module" src="./src/main.js"></script>
    <script>
      const dispatchDuatTouchAction = (action, phase = 'tap') => {
        window.dispatchEvent(new CustomEvent('duat-touch-action', { detail: { action, phase } }));
      };

      const touchControlsRoot = document.querySelector('.touch-controls');

      const debugPanel = document.querySelector('[data-duat-debug-panel]');
      const debugCollapseButton = document.querySelector('[data-duat-debug-collapse]');
      const debugToggleButton = document.querySelector('[data-duat-debug-toggle]');
      const titleElement = document.querySelector('[data-duat-title]');

      const setDebugPanelVisible = (isVisible) => {
        debugPanel?.classList.toggle('is-visible', Boolean(isVisible));
      };

      const toggleDebugPanelCollapsed = () => {
        if (!debugPanel || !debugCollapseButton) {
          return;
        }
        const isCollapsed = debugPanel.classList.toggle('is-collapsed');
        debugCollapseButton.textContent = isCollapsed ? 'DEBUG ▸' : 'DEBUG ▾';
      };

      debugCollapseButton?.addEventListener('click', toggleDebugPanelCollapsed);
      debugToggleButton?.addEventListener('click', () => dispatchDuatTouchAction('debug-toggle'));

      let titleLongPressTimer = null;
      const clearTitleLongPressTimer = () => {
        if (titleLongPressTimer) {
          window.clearTimeout(titleLongPressTimer);
          titleLongPressTimer = null;
        }
      };
      titleElement?.addEventListener('pointerdown', () => {
        clearTitleLongPressTimer();
        titleLongPressTimer = window.setTimeout(() => dispatchDuatTouchAction('debug-toggle'), 2000);
      });
      ['pointerup', 'pointercancel', 'pointerleave'].forEach((eventName) => {
        titleElement?.addEventListener(eventName, clearTitleLongPressTimer);
      });

      window.addEventListener('duat-debug-mode', (event) => {
        setDebugPanelVisible(Boolean(event?.detail?.isDebugMode));
      });

      window.addEventListener('duat-touch-state', (event) => {
        const hasBombSelected = Boolean(event?.detail?.hasBombSelected);
        touchControlsRoot?.classList.toggle('touch-controls--bomb-selected', hasBombSelected);
      });

      window.addEventListener('duat-touch-visibility', (event) => {
        const isVisible = event?.detail?.isVisible !== false;
        touchControlsRoot?.classList.toggle('is-hidden', !isVisible);
      });

      document.querySelectorAll('[data-duat-action]').forEach((button) => {
        const action = button.dataset.duatAction;
        const isHoldButton = button.dataset.duatHold === 'true';

        button.addEventListener('pointerdown', (event) => {
          event.preventDefault();
          button.setPointerCapture?.(event.pointerId);
          dispatchDuatTouchAction(action, isHoldButton ? 'down' : 'tap');
        });

        if (isHoldButton) {
          const release = (event) => {
            event.preventDefault();
            dispatchDuatTouchAction(action, 'up');
          };
          button.addEventListener('pointerup', release);
          button.addEventListener('pointercancel', release);
          button.addEventListener('lostpointercapture', () => dispatchDuatTouchAction(action, 'up'));
        }
      });
    </script>
  </body>
</html>
