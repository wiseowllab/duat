<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DUAT — Phase 3 Prototype</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, sans-serif;
        background: #080704;
        color: #eadfca;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 50% 8%, rgba(212, 175, 55, 0.16), transparent 28rem),
          radial-gradient(circle at 18% 24%, rgba(112, 74, 28, 0.24), transparent 20rem),
          linear-gradient(135deg, #050403 0%, #100b08 58%, #25170c 100%);
      }

      main {
        text-align: center;
      }

      h1 {
        margin: 0 0 0.25rem;
        color: #d4af37;
        font-family: Georgia, serif;
        letter-spacing: 0.12em;
      }

      p {
        margin: 0 0 1rem;
        color: #cdbf9d;
      }

      #game canvas {
        border: 2px solid rgba(212, 175, 55, 0.78);
        box-shadow:
          0 18px 44px rgba(0, 0, 0, 0.58),
          0 0 34px rgba(212, 175, 55, 0.12);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DUAT</h1>
      <p>Phase 3 coffin meter, god unlock, canopic set, clear, gravity, chain, and score prototype</p>
      <div id="game"></div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
