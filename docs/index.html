<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>DUAT — Phase 3 Prototype</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, sans-serif;
        background: #080704;
        color: #eadfca;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        overscroll-behavior: none;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 50% 8%, rgba(212, 175, 55, 0.16), transparent 28rem),
          radial-gradient(circle at 18% 24%, rgba(112, 74, 28, 0.24), transparent 20rem),
          linear-gradient(135deg, #050403 0%, #100b08 58%, #25170c 100%);
      }

      main {
        width: min(100%, 58rem);
        padding: 0.5rem;
        box-sizing: border-box;
        text-align: center;
      }

      h1 {
        margin: 0 0 0.25rem;
        color: #d4af37;
        font-family: Georgia, serif;
        letter-spacing: 0.12em;
      }

      p {
        margin: 0 0 1rem;
        color: #cdbf9d;
      }

      .desktop-control-help {
        width: min(100%, 760px);
        margin: 0.55rem auto 0;
        color: #bcae90;
        font-size: 0.78rem;
        line-height: 1.35;
        letter-spacing: 0.02em;
      }

      #game {
        display: flex;
        justify-content: center;
        min-width: 0;
        touch-action: none;
      }

      #game canvas {
        width: auto;
        max-width: 100%;
        height: min(600px, 79vw, calc(100dvh - 16rem));
        border: 2px solid rgba(212, 175, 55, 0.78);
        box-shadow:
          0 18px 44px rgba(0, 0, 0, 0.58),
          0 0 34px rgba(212, 175, 55, 0.12);
        touch-action: none;
        user-select: none;
      }

      .touch-controls {
        display: none;
        width: min(100%, 760px);
        margin: 0.55rem auto 0;
        gap: 0.45rem;
        touch-action: none;
        user-select: none;
      }

      .touch-row,
      .touch-controls__top,
      .touch-controls__main,
      .touch-cluster,
      .touch-actions,
      .touch-bombs {
        display: grid;
        gap: 0.45rem;
      }

      .touch-controls__top,
      .touch-controls__main {
        grid-template-columns: 1fr 1fr;
        align-items: end;
      }

      .touch-row {
        grid-template-columns: repeat(3, 1fr);
      }

      .touch-actions,
      .touch-bombs {
        grid-template-columns: repeat(2, 1fr);
      }

      .touch-button {
        min-height: 2.65rem;
        border: 2px solid rgba(212, 175, 55, 0.82);
        border-radius: 0.55rem;
        background:
          linear-gradient(180deg, rgba(67, 43, 22, 0.98), rgba(24, 16, 9, 0.98));
        box-shadow: inset 0 0 0 1px rgba(244, 215, 122, 0.16), 0 0.35rem 0.9rem rgba(0, 0, 0, 0.32);
        color: #f4d77a;
        font-weight: 800;
        font-size: 1rem;
        letter-spacing: 0.05em;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }

      .touch-button:active {
        transform: translateY(1px);
        background: linear-gradient(180deg, rgba(92, 61, 27, 1), rgba(36, 24, 13, 1));
      }

      .touch-button--pause,
      .touch-button--cancel {
        min-height: 2.15rem;
        font-size: 0.82rem;
        color: #eadfca;
        border-color: rgba(244, 215, 122, 0.62);
      }

      @media (hover: none), (max-width: 760px) {
        body {
          align-items: start;
        }

        main {
          width: 100%;
          padding: max(0.25rem, env(safe-area-inset-top)) max(0.35rem, env(safe-area-inset-right)) max(0.45rem, env(safe-area-inset-bottom)) max(0.35rem, env(safe-area-inset-left));
        }

        h1 {
          margin-bottom: 0.1rem;
          font-size: clamp(1.05rem, 6vw, 1.35rem);
          line-height: 1.05;
        }

        p {
          max-width: 32rem;
          margin: 0 auto 0.3rem;
          font-size: clamp(0.68rem, 2.7vw, 0.78rem);
          line-height: 1.2;
        }

        #game canvas {
          height: min(600px, calc((100vw - 0.7rem) * 0.789), calc(100dvh - 8.35rem));
        }

        .desktop-control-help {
          display: none;
        }

        .touch-controls {
          display: grid;
          grid-template-columns: repeat(6, minmax(0, 1fr));
          grid-auto-rows: minmax(2.55rem, auto);
          gap: 0.35rem;
          margin-top: 0.35rem;
        }

        .touch-controls__top,
        .touch-controls__main,
        .touch-cluster,
        .touch-row,
        .touch-actions,
        .touch-bombs {
          display: contents;
        }

        .touch-button {
          min-width: 0;
          min-height: 2.55rem;
          padding: 0.25rem 0.2rem;
          border-radius: 0.45rem;
          font-size: clamp(0.78rem, 3.2vw, 0.95rem);
          line-height: 1;
        }

        .touch-button--pause,
        .touch-button--cancel {
          min-height: 2.25rem;
          font-size: clamp(0.66rem, 2.7vw, 0.78rem);
        }

        [data-duat-action="cancel"] { grid-column: 1; grid-row: 1; }
        [data-duat-action="pause"] { grid-column: 2; grid-row: 1; }
        [data-duat-action="bomb-0"] { grid-column: 3; grid-row: 1; }
        [data-duat-action="bomb-1"] { grid-column: 4; grid-row: 1; }
        [data-duat-action="bomb-2"] { grid-column: 5; grid-row: 1; }
        [data-duat-action="bomb-3"] { grid-column: 6; grid-row: 1; }

        [data-duat-action="left"] { grid-column: 1; grid-row: 2; }
        [data-duat-action="down"] { grid-column: 2; grid-row: 2; }
        [data-duat-action="right"] { grid-column: 3; grid-row: 2; }
        [data-duat-action="rotate"] { grid-column: 4; grid-row: 2; }
        [data-duat-action="drop"] { grid-column: 5 / 7; grid-row: 2; }
      }

      @media (max-width: 420px) {
        .touch-controls {
          gap: 0.3rem;
        }
      }

      @media (hover: none) and (max-height: 620px), (max-width: 760px) and (max-height: 620px) {
        main {
          padding-top: max(0.15rem, env(safe-area-inset-top));
        }

        p {
          margin-bottom: 0.2rem;
        }

        #game canvas {
          height: min(600px, calc((100vw - 0.7rem) * 0.789), calc(100dvh - 7.55rem));
        }

        .touch-controls {
          grid-auto-rows: minmax(2.28rem, auto);
          gap: 0.25rem;
          margin-top: 0.25rem;
        }

        .touch-button {
          min-height: 2.28rem;
        }

        .touch-button--pause,
        .touch-button--cancel {
          min-height: 2.05rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DUAT</h1>
      <p>Phase 3 coffin meter, god unlock, canopic set, clear, gravity, chain, and score prototype</p>
      <div id="game"></div>
      <p class="desktop-control-help">Keyboard: ←/→ Move · ↓ Soft Drop · ↑/Z Rotate · Space Drop/Use Bomb · 1–4 Preview Bomb · Esc Cancel · Enter Pause · M Mute</p>
      <section class="touch-controls" aria-label="DUAT touch controls">
        <div class="touch-controls__top">
          <button class="touch-button touch-button--cancel" type="button" data-duat-action="cancel">ESC</button>
          <button class="touch-button touch-button--pause" type="button" data-duat-action="pause">PAUSE</button>
        </div>
        <div class="touch-controls__main">
          <div class="touch-cluster" aria-label="Movement controls">
            <div class="touch-row">
              <button class="touch-button" type="button" data-duat-action="left" aria-label="Left">LEFT</button>
              <button class="touch-button" type="button" data-duat-action="down" data-duat-hold="true" aria-label="Down">DOWN</button>
              <button class="touch-button" type="button" data-duat-action="right" aria-label="Right">RIGHT</button>
            </div>
          </div>
          <div class="touch-actions" aria-label="Action controls">
            <button class="touch-button" type="button" data-duat-action="rotate">ROT</button>
            <button class="touch-button" type="button" data-duat-action="drop">DROP</button>
          </div>
        </div>
        <div class="touch-bombs" aria-label="Bomb controls">
          <button class="touch-button" type="button" data-duat-action="bomb-0">B1</button>
          <button class="touch-button" type="button" data-duat-action="bomb-1">B2</button>
          <button class="touch-button" type="button" data-duat-action="bomb-2">B3</button>
          <button class="touch-button" type="button" data-duat-action="bomb-3">B4</button>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script type="module" src="./src/main.js"></script>
    <script>
      const dispatchDuatTouchAction = (action, phase = 'tap') => {
        window.dispatchEvent(new CustomEvent('duat-touch-action', { detail: { action, phase } }));
      };

      document.querySelectorAll('[data-duat-action]').forEach((button) => {
        const action = button.dataset.duatAction;
        const isHoldButton = button.dataset.duatHold === 'true';

        button.addEventListener('pointerdown', (event) => {
          event.preventDefault();
          button.setPointerCapture?.(event.pointerId);
          dispatchDuatTouchAction(action, isHoldButton ? 'down' : 'tap');
        });

        if (isHoldButton) {
          const release = (event) => {
            event.preventDefault();
            dispatchDuatTouchAction(action, 'up');
          };
          button.addEventListener('pointerup', release);
          button.addEventListener('pointercancel', release);
          button.addEventListener('lostpointercapture', () => dispatchDuatTouchAction(action, 'up'));
        }
      });
    </script>
  </body>
</html>
